<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PicoNest BLE Controller</title>

<style>
  :root {
    --orange: #E8821A;
    --orange-light: #F9A84D;
    --orange-dark: #C46A0E;
    --bg: #F5F3EF;
    --surface: #FFFFFF;
    --surface2: #EEEBE4;
    --border: #DDD9CE;
    --text: #2C2A25;
    --text-muted: #9B9285;
    --shadow: 0 2px 12px rgba(44,42,37,0.10);
    --shadow-lg: 0 8px 32px rgba(44,42,37,0.14);
    --radius: 16px;
    --connected: #34C759;
    --disconnected: #FF3B30;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ========= 接続ボタン & ログ（上部中央） ========= */
  .connect-panel {
    width: 100%;
    padding-top: 10px;
    text-align: center;
  }

  .debug-panel {
    width: 90%;
    max-width: 360px;
    margin: 0 auto 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
  }

  .debug-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 3px;
  }

  .debug-log {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--orange);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .connect-btn {
    background: var(--orange);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px 26px;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
  }

  /* ========= コントローラー全体 ========= */
  .controller {
    flex: 1;
    width: 100%;
    position: relative;
  }

  /* ========= 左下ジョイスティック ========= */
  .joystick-area {
    position: absolute;
    bottom: 16px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .joystick-container {
    position: relative;
    width: 160px;
    height: 160px;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 50%;
    box-shadow: var(--shadow-lg);
  }

  .joystick-bg-ring {
    position: absolute;
    inset: 14px;
    border-radius: 50%;
    border: 2px dashed var(--border);
  }

  .joystick-crosshair {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .joystick-crosshair::before,
  .joystick-crosshair::after {
    content: '';
    position: absolute;
    background: var(--border);
  }
  .joystick-crosshair::before {
    width: 100%;
    height: 1px;
  }
  .joystick-crosshair::after {
    width: 1px;
    height: 100%;
  }

  .joystick-knob {
    position: absolute;
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(145deg, #fff 0%, var(--surface2) 100%);
    border: 3px solid var(--orange);

    display: flex;
    align-items: center;
    justify-content: center;

    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    pointer-events: none;
    display: flex;            /* ★ 中央揃えに必要 */
    align-items: center;      /* ★ 中央揃え */
    justify-content: center;  /* ★ 中央揃え */
  }

  .joystick-values {
    display: flex;
    gap: 12px;
  }

  .joystick-val {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  /* ========= 右下 ABXY ========= */
  .buttons-area {
    position: absolute;
    bottom: 16px;
    right: 16px;

    display: flex;              /* ★ 横並び */
    flex-direction: row;        /* ★ 左→右 */
    align-items: center;        /* ★ 縦中央揃え */
    gap: 12px;                  /* ★ インジケータとボタンの間隔 */
  }

  .abxy-grid {
    display: grid;
    width: 160px;
    height: 160px;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 6px;
  }

  .action-btn {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: none;
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
  }

  .btn-x { background: #007AFF; color: white; grid-column: 2; grid-row: 1; }
  .btn-y { background: #34C759; color: white; grid-column: 1; grid-row: 2; }
  .btn-a { background: #FF453A; color: white; grid-column: 3; grid-row: 2; }
  .btn-b { background: #FFD60A; color: #5a4400; grid-column: 2; grid-row: 3; }

  
  /* ボタン押し込みアニメーション */
  .action-btn {
    transition: all 0.08s;
    box-shadow: 0 4px 0 rgba(0,0,0,0.25);
  }

  .action-btn.pressed {
    transform: translateY(4px);
    box-shadow: none;
  }


/* ボタンインジケータ全体 */
.indicator-grid {
  display: grid;
  width: 80px;        /* ボタン側の半分サイズ */
  height: 80px;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows: repeat(3, 1fr);
  gap: 6px;
  margin-right: 10px; /* ボタンとインジケータの間隔 */
}

/* LED インジケータ */
.indicator {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: #ddd;          /* 消灯時 */
  opacity: 0.4;
  margin: auto;
  box-shadow: 0 0 6px rgba(0,0,0,0.1);
  transition: all 0.15s;
}

.indicator.on {
    /*
  opacity: 1;
  box-shadow: 0 0 10px currentColor, 0 0 4px currentColor inset;
  */
  background: currentColor;      /* ← 本体がボタン色になる */
  opacity: 1;
  box-shadow:
    inset 0 0 4px rgba(255,255,255,0.6),
    0 0 6px currentColor;        /* やや光る */

}

  /* ========= Toast ========= */
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 10px 20px;
    border-radius: 24px;
    opacity: 0;
    transition: .3s;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

</style>
</head>

<body>

<!-- 接続ボタン & ログ（中央上部） -->
<div class="connect-panel">

  <div class="debug-panel">
    <div class="debug-label">送信ログ</div>
    <div class="debug-log" id="debugLog">-- 未接続 --</div>
  </div>

  <button class="connect-btn" id="connectBtn" onclick="toggleConnect()">接続する</button>
</div>

<!-- コントローラー -->
<div class="controller">

  <!-- 左下ジョイスティック -->
  <div class="joystick-area">
    <div class="joystick-container" id="joystickArea">
      <div class="joystick-bg-ring"></div>
      <div class="joystick-crosshair"></div>
      <div class="joystick-knob" id="joystickKnob">
        <div style="width:12px;height:12px;background:var(--orange);border-radius:50%;opacity:0.5;"></div>
      </div>
    </div>

    <div class="joystick-values">
      <div class="joystick-val">X: <span id="joyX">0</span></div>
      <div class="joystick-val">Y: <span id="joyY">0</span></div>
    </div>
  </div>

  <!-- 右下 ABXY -->
  <div class="buttons-area">
    
    <!-- インジケータ（左側） -->
    <div class="indicator-grid">
      <div class="indicator" id="indX" style="grid-row:1;grid-column:2; color:#007AFF;"></div>
      <div class="indicator" id="indY" style="grid-row:2;grid-column:1; color:#34C759;"></div>
      <div class="indicator" id="indA" style="grid-row:2;grid-column:3; color:#FF453A;"></div>
      <div class="indicator" id="indB" style="grid-row:3;grid-column:2; color:#FFD60A;"></div>
    </div>

    <!-- ボタン -->
    <div class="abxy-grid">
      <button class="action-btn btn-x" id="btnX" data-bit="2">X</button>
      <button class="action-btn btn-y" id="btnY" data-bit="3">Y</button>
      <button class="action-btn btn-a" id="btnA" data-bit="0">A</button>
      <button class="action-btn btn-b" id="btnB" data-bit="1">B</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
/* ========= BLE UUID ========= */
const BLE_SERVICE_UUID       = '0000ffe0-0000-1000-8000-00805f9b34fb';
const BLE_CHAR_JOYSTICK_UUID = '0000ffe1-0000-1000-8000-00805f9b34fb';
const BLE_CHAR_BUTTON_UUID   = '0000ffe2-0000-1000-8000-00805f9b34fb';

let device = null, server = null;
let charJoystick = null, charButton = null;
let isConnected = false;

let buttonState = 0;
let lastButtonState = 0xFF;

let joyX = 0, joyY = 0;
let lastJoyX = 0, lastJoyY = 0;

let returningToCenter = false;
let returnAnimTimer = null;

let returnStartDX = 0;
let returnStartDY = 0;
let returnStartTime = 0;

let knobDX = 0;   // 現在のノブ位置 (px)
let knobDY = 0;


/* ========= 接続 ========= */
async function toggleConnect() {
  if (isConnected) disconnect();
  else await connect();
}

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [BLE_SERVICE_UUID]
    });

    device.addEventListener("gattserverdisconnected", onDisconnected);

    server = await device.gatt.connect();
    const service = await server.getPrimaryService(BLE_SERVICE_UUID);

    charJoystick = await service.getCharacteristic(BLE_CHAR_JOYSTICK_UUID);
    charButton   = await service.getCharacteristic(BLE_CHAR_BUTTON_UUID);

    isConnected = true;
    document.getElementById("connectBtn").textContent = "切断する";

    showToast("接続されました");
    setDebug("接続完了");

  } catch (e) {
    showToast("接続失敗: " + e.message);
  }
}

function disconnect() {
  if (device && device.gatt.connected) device.gatt.disconnect();
}

function onDisconnected() {
  isConnected = false;
  document.getElementById("connectBtn").textContent = "接続する";
  showToast("切断されました");
  setDebug("切断");
}

/* ========= 送信 ========= */
async function sendJoystick() {
  if (!isConnected || !charJoystick) return;
  if (joyX === lastJoyX && joyY === lastJoyY) return;

  lastJoyX = joyX;
  lastJoyY = joyY;

  await charJoystick.writeValueWithoutResponse(new Int8Array([joyX, joyY]));
  setDebug("JOY X:" + joyX + " Y:" + joyY);
}

async function sendButtons() {
  if (!isConnected || !charButton) return;
  if (buttonState === lastButtonState) return;

  lastButtonState = buttonState;

  await charButton.writeValueWithoutResponse(new Uint8Array([buttonState]));
  setDebug("BTN: " + buttonState.toString(2).padStart(8,"0"));
}

/* ========= ジョイスティック ========= */
const joystickArea = document.getElementById("joystickArea");
const knob = document.getElementById("joystickKnob");

const joyXEl = document.getElementById("joyX");
const joyYEl = document.getElementById("joyY");

let joystickActive = false;
let joystickOrigin = { x: 0, y: 0 };

const KNOB_RADIUS = 48;

function getCenter(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width/2, y: r.top + r.height/2 };
}



function startJoystick(cx, cy) {
  if (returningToCenter) {
    returningToCenter = false;
    clearInterval(returnAnimTimer);
  }

  joystickActive = true;
  joystickOrigin = { x: cx, y: cy };
}


function moveJoystick(cx, cy) {
  if (!joystickActive) return;

  let dx = cx - joystickOrigin.x;
  let dy = cy - joystickOrigin.y;

  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > KNOB_RADIUS) {
    dx = dx / dist * KNOB_RADIUS;
    dy = dy / dist * KNOB_RADIUS;
  }

  knobDX = dx;
  knobDY = dy;

  knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;

  joyX = Math.round(dx / KNOB_RADIUS * 127);
  joyY = Math.round(dy / KNOB_RADIUS * 127);
  joyXEl.textContent = joyX;
  joyYEl.textContent = joyY;

  sendJoystick();
}


function stopJoystick() {
  if (!joystickActive) return;

  joystickActive = false;
  returningToCenter = true;

  const startDX = knobDX;
  const startDY = knobDY;

  const startTime = performance.now();
  const duration = 150; // ノブが中央の戻るまでの時間 ms

  clearInterval(returnAnimTimer);
  returnAnimTimer = setInterval(() => {

    if (!returningToCenter) {
      clearInterval(returnAnimTimer);
      return;
    }

    const t = (performance.now() - startTime) / duration;

    if (t >= 1) {
      // 終了
      knobDX = 0;
      knobDY = 0;
      knob.style.transform = `translate(-50%, -50%)`;

      joyX = 0;
      joyY = 0;
      joyXEl.textContent = 0;
      joyYEl.textContent = 0;
      sendJoystick();

      clearInterval(returnAnimTimer);
      returningToCenter = false;
      return;
    }

    // 線形補間
    knobDX = startDX * (1 - t);
    knobDY = startDY * (1 - t);

    knob.style.transform = `translate(calc(-50% + ${knobDX}px), calc(-50% + ${knobDY}px))`;

    joyX = Math.round(knobDX / KNOB_RADIUS * 127);
    joyY = Math.round(knobDY / KNOB_RADIUS * 127);
    joyXEl.textContent = joyX;
    joyYEl.textContent = joyY;

    sendJoystick();

  }, 16); // 60FPS
}


/* Touch */
joystickArea.addEventListener("touchstart", e => {
  const t = e.touches[0];
  const c = getCenter(joystickArea);
  startJoystick(c.x, c.y);
  moveJoystick(t.clientX, t.clientY);
});
joystickArea.addEventListener("touchmove", e => {
  const t = e.touches[0];
  moveJoystick(t.clientX, t.clientY);
});
joystickArea.addEventListener("touchend", stopJoystick);

/* Mouse */
joystickArea.addEventListener("mousedown", e => {
  const c = getCenter(joystickArea);
  startJoystick(c.x, c.y);
  moveJoystick(e.clientX, e.clientY);
});
document.addEventListener("mousemove", e => {
  if (joystickActive) moveJoystick(e.clientX, e.clientY);
});
document.addEventListener("mouseup", stopJoystick);

/* ========= 各ボタン ========= */

function setupButton(el) {
  const bit = parseInt(el.dataset.bit);
  const id = el.id.replace("btn", "ind");   // btnA → indA

  const indicator = document.getElementById(id);

  const press = () => {
    el.classList.add("pressed");      // ← 見た目：沈み込む
    indicator.classList.add("on");     // ← LED 点灯
    buttonState |= (1 << bit);
    sendButtons();
  };

  const release = () => {
    el.classList.remove("pressed");   // ← 元に戻る
    indicator.classList.remove("on");  // ← LED 消灯
    buttonState &= ~(1 << bit);
    sendButtons();
  };

  // Touch
  el.addEventListener("touchstart", press);
  el.addEventListener("touchend", release);
  el.addEventListener("touchcancel", release);

  // Mouse
  el.addEventListener("mousedown", press);
  el.addEventListener("mouseup", release);
  el.addEventListener("mouseleave", release);
}


["btnA","btnB","btnX","btnY"].forEach(id => {
  setupButton(document.getElementById(id));
});

/* ========= Utility ========= */
function setDebug(msg) {
  document.getElementById("debugLog").textContent = msg;
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

</script>
</body>
</html>
